<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 560px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            color: #aaa;
            text-align: center;
            margin-bottom: 28px;
            font-size: 14px;
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input::placeholder { color: #888; }
        input:focus { border-color: #00bcd4; }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00bcd4, #2196f3);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            white-space: nowrap;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 188, 212, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            display: none;
        }
        .status.show { display: block; }
        .loading { text-align: center; }
        .spinner {
            width: 24px; height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #00bcd4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        video {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 16px;
            background: #000;
            max-height: 500px;
        }
        .image-gallery {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 12px;
            margin-bottom: 12px;
            scroll-snap-type: x mandatory;
        }
        .image-gallery img {
            height: 300px;
            border-radius: 10px;
            scroll-snap-align: start;
            flex-shrink: 0;
            background: #000;
        }
        .result {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            background: rgba(0, 200, 83, 0.1);
            border: 1px solid rgba(0, 200, 83, 0.3);
            text-align: center;
        }
        .result.show { display: block; }
        .result .size { color: #aaa; font-size: 13px; margin: 8px 0 16px; }
        .result-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-download {
            display: inline-block;
            padding: 10px 28px;
            background: linear-gradient(135deg, #00c853, #009624);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.15s;
        }
        .btn-download:hover { transform: translateY(-1px); }
        .error {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.3);
            color: #ff5252;
        }
        .error .hint {
            margin-top: 8px;
            font-size: 12px;
            color: #aaa;
        }
        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TikTok Downloader</h1>
        <p class="subtitle">Tải video / ảnh TikTok không watermark</p>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Dán link TikTok vào đây...">
            <button id="downloadBtn" onclick="startDownload()">Tải</button>
        </div>

        <div class="status show" id="status">
            <div class="loading">
                <div class="spinner"></div>
                <span>Nhập link TikTok để bắt đầu</span>
            </div>
        </div>

        <div class="result" id="result">
            <div id="previewArea"></div>
            <div style="font-weight: 600;">Tải thành công!</div>
            <div class="size" id="fileSize"></div>
            <div class="result-actions" id="resultActions"></div>
        </div>

        <div class="footer">Powered by yt-dlp</div>
    </div>

    <script>
        async function startDownload() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url || !url.includes('tiktok')) {
                showStatus('Vui lòng nhập link TikTok hợp lệ', true);
                return;
            }

            const btn = document.getElementById('downloadBtn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');

            btn.disabled = true;
            result.classList.remove('show');
            status.classList.add('show');
            status.innerHTML = '<div class="loading"><div class="spinner"></div><span>Đang tải...</span></div>';

            try {
                const formData = new FormData();
                formData.append('url', url);

                const resp = await fetch('/api/download', { method: 'POST', body: formData });
                const data = await resp.json();

                if (data.success) {
                    status.classList.remove('show');
                    result.classList.add('show');

                    document.getElementById('fileSize').textContent = `Tổng dung lượng: ${data.size_mb} MB`;

                    const previewArea = document.getElementById('previewArea');
                    previewArea.innerHTML = '';

                    const imgExts = ['.jpg', '.jpeg', '.png', '.webp'];
                    const vidExts = ['.mp4', '.webm', '.mkv', '.mov'];
                    const images = data.files.filter(f => imgExts.some(e => f.toLowerCase().endsWith(e)));
                    const videos = data.files.filter(f => vidExts.some(e => f.toLowerCase().endsWith(e)));
                    const audios = data.files.filter(f => !imgExts.some(e => f.toLowerCase().endsWith(e)) && !vidExts.some(e => f.toLowerCase().endsWith(e)));

                    if (data.type === 'video' || videos.length > 0) {
                        const video = document.createElement('video');
                        video.controls = true;
                        video.playsInline = true;
                        video.src = `/downloads/${videos[0] || data.files[0]}`;
                        previewArea.appendChild(video);
                        document.getElementById('resultActions').innerHTML =
                            `<a class="btn-download" href="/downloads/${videos[0] || data.files[0]}" download>Tải video</a>`;
                    } else {
                        if (images.length > 0) {
                            const gallery = document.createElement('div');
                            gallery.className = 'image-gallery';
                            images.forEach(f => {
                                const img = document.createElement('img');
                                img.src = `/downloads/${f}`;
                                img.alt = f;
                                gallery.appendChild(img);
                            });
                            previewArea.appendChild(gallery);
                        }
                        let actions = images.map(f =>
                            `<a class="btn-download" href="/downloads/${f}" download>Tải ảnh</a>`
                        ).join(' ');
                        if (audios.length > 0) {
                            actions += audios.map(f =>
                                `<a class="btn-download" style="background:linear-gradient(135deg,#7c4dff,#651fff)" href="/downloads/${f}" download>Tải nhạc</a>`
                            ).join(' ');
                        }
                        document.getElementById('resultActions').innerHTML = actions;
                    }
                } else {
                    showStatus('Lỗi: ' + data.error + '<div class="hint">Thử cập nhật: py -m pip install -U yt-dlp</div>', true);
                }
            } catch (e) {
                showStatus('Lỗi kết nối đến server', true);
            } finally {
                btn.disabled = false;
            }
        }

        function showStatus(msg, isError = false) {
            const status = document.getElementById('status');
            status.classList.add('show');
            status.className = 'status show' + (isError ? ' error' : '');
            status.innerHTML = msg;
        }

        document.getElementById('urlInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') startDownload();
        });
    </script>
</body>
</html>
