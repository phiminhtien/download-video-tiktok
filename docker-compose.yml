services:
  web:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./downloads:/app/downloads
    environment:
      - DOWNLOAD_TTL=0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
